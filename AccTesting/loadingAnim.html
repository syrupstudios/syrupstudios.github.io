<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: white;
        overflow: hidden;
      }
      .container {
        position: relative;
        width: 50px; /* Adjusted to fit the smaller squares */
        height: 50px; /* Adjusted to fit the smaller squares */
      }
      .square {
        position: absolute;
        border: 4px solid black; /* Thicker outline */
        border-radius: 3px; /* Rounded corners */
        transition: all 0.3s ease-in-out;
      }
      .top-left {
        top: 0;
        left: 0;
        width: 10px; /* Smaller size */
        height: 10px; /* Smaller size */
      }
      .bottom-right {
        bottom: 0;
        right: 0;
        width: 10px; /* Smaller size */
        height: 10px; /* Smaller size */
      }
      .top-right {
        top: 0;
        right: 0;
        width: 10px; /* Smaller size */
        height: 10px; /* Smaller size */
      }
      .bottom-left {
        bottom: 0;
        left: 0;
        width: 10px; /* Smaller size */
        height: 10px; /* Smaller size */
      }
      .top-left.animation {
        animation: topLeftSequence 1.5s infinite;
      }
      .bottom-right.animation {
        animation: bottomRightSequence 1.5s infinite;
      }
      .bottom-left.animation {
        animation: bottomLeftSequence 1.5s infinite;
      }
      .top-right.animation {
        animation: topRightSequence 1.5s infinite;
      }
      @keyframes topLeftSequence {
        0% {
          width: 10px;
          height: 10px;
        }
        25% {
          width: 20px;
          height: 20px;
        }
        50% {
          width: 10px;
          height: 10px;
        }
        75% {
          width: 10px;
          height: 10px;
        }
        100% {
          width: 10px;
          height: 10px;
        }
      }
      @keyframes bottomRightSequence {
        0% {
          width: 10px;
          height: 10px;
        }
        25% {
          width: 10px;
          height: 10px;
        }
        50% {
          width: 20px;
          height: 20px;
        }
        75% {
          width: 10px;
          height: 10px;
        }
        100% {
          width: 10px;
          height: 10px;
        }
      }
      @keyframes bottomLeftSequence {
        0% {
          width: 10px;
          height: 10px;
        }
        25% {
          width: 10px;
          height: 10px;
        }
        50% {
          width: 10px;
          height: 10px;
        }
        75% {
          width: 20px;
          height: 20px;
        }
        100% {
          width: 10px;
          height: 10px;
        }
      }
      @keyframes topRightSequence {
        0% {
          width: 10px;
          height: 10px;
        }
        25% {
          width: 10px;
          height: 10px;
        }
        50% {
          width: 10px;
          height: 10px;
        }
        75% {
          width: 10px;
          height: 10px;
        }
        100% {
          width: 20px;
          height: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="square top-left animation"></div>
      <div class="square bottom-right animation"></div>
      <div class="square top-right animation"></div>
      <div class="square bottom-left animation"></div>
    </div>
  </body>
</html>
