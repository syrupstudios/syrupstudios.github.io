<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login and Signup Form</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container right-panel-active" id="container">
      <iframe
        id="loader"
        class="loading"
        src="loadingAnim.html"
        frameborder="0"
      ></iframe>
      <div class="form-container sign-up-container">
        <form action="#">
          <h1>Create Account</h1>
          <input type="email" placeholder="Email" id="register-email" />
          <input
            type="password"
            placeholder="Password"
            id="register-password"
          />
          <div id="error-signup" class="error-text"></div>
          <button type="button" id="register-btn">Sign Up</button>
        </form>
      </div>
      <div class="form-container sign-in-container">
        <form action="#">
          <h1>Sign in</h1>
          <input type="email" placeholder="Email" id="login-email" />
          <input type="password" placeholder="Password" id="login-password" />
          <a href="#" id="reset-btn">Forgot your password?</a>
          <div id="error-login" class="error-text"></div>
          <button type="button" id="login-btn">Sign In</button>
        </form>
      </div>
      <div class="overlay-container">
        <div class="overlay">
          <div class="overlay-panel overlay-left">
            <h1>Welcome Back!</h1>
            <p>
              To keep connected with us please login with your personal info
            </p>
            <button class="ghost" id="signIn">Sign In</button>
          </div>
          <div class="overlay-panel overlay-right">
            <h1>Hello, Friend!</h1>
            <p>Enter your personal details and start journey with us</p>
            <button class="ghost" id="signUp">Sign Up</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="script.js"></script>
    <script src="https://syrupstudios.github.io/ast.syrupstudios.github.io/API/sypAPI_google.firebase9.15.0.js"></script>
  </body>
</html>
